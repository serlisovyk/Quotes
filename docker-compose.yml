name: quotes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    user: "999:999"
    env_file:
      - ./server/.env
    volumes:
      - quotes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: serhii5105/quotes-server:latest
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  client:
    image: serhii5105/quotes-client:latest
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - '4000:4000'
    depends_on:
      server:
        condition: service_healthy

volumes:
  quotes_pg_data:
