name: quotes-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      - quotes_pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - '3001:3001'
    volumes:
      - ./server:/app
      - quotes_server_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - '4000:4000'
    volumes:
      - ./client:/app
      - quotes_client_node_modules:/app/node_modules
      - quotes_client_next:/app/.next
    depends_on:
      server:
        condition: service_healthy

  adminer:
    image: adminer:4-standalone
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  quotes_pg_data_dev:
  quotes_server_node_modules:
  quotes_client_node_modules:
  quotes_client_next:
